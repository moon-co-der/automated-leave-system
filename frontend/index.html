<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeeSoft Leave Management</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Header -->
    <header class="header">

        <div class="logo-section">
            <img src="assets/neesoft-logo.png" alt="NeeSoft Logo">
            <div>
                <h1>NeeSoft Solutions</h1>
                <p>Leave Management Portal</p>
            </div>
        </div>

        <div class="date-section">
            <span id="currentDate"></span>
        </div>

    </header>

    <!-- Statistics -->
    <section class="stats">

        <div class="stat-card pending">
            <h2 id="pendingCount">0</h2>
            <p>Pending</p>
        </div>

        <div class="stat-card approved">
            <h2 id="approvedCount">0</h2>
            <p>Approved</p>
        </div>

        <div class="stat-card rejected">
            <h2 id="rejectedCount">0</h2>
            <p>Rejected</p>
        </div>

    </section>

    <!-- Pending Requests -->
    <section class="requests">

        <div class="section-title">

            <h2>Pending Leave Requests</h2>

        </div>

        <!-- Cards generated using JavaScript -->
        <div id="leaveContainer"></div>

    </section>

    <!-- ============ APPROVE MODAL ============ -->
    <div id="approveModal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="approveModalTitle">
        <div class="modal">
            <h3 id="approveModalTitle">Approve Leave</h3>
            <label for="approveReason">Optional Message</label>
            <textarea
                id="approveReason"
                placeholder="Example: Enjoy your vacation!"
                rows="4"
            ></textarea>
            <div class="modal-actions">
                <button id="approveCancelBtn" class="modal-cancel-btn" onclick="closeModal('approveModal')">Cancel</button>
                <button id="approveConfirmBtn" class="modal-approve-btn" onclick="confirmApprove()">Approve</button>
            </div>
        </div>
    </div>

    <!-- ============ REJECT MODAL ============ -->
    <div id="rejectModal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="rejectModalTitle">
        <div class="modal">
            <h3 id="rejectModalTitle">Reject Leave</h3>
            <label for="rejectReason">Reason <span class="required">*</span></label>
            <textarea
                id="rejectReason"
                placeholder="Example: Project deadline this week."
                rows="4"
            ></textarea>
            <p id="rejectReasonError" class="field-error" style="display:none;">Please provide a reason.</p>
            <div class="modal-actions">
                <button id="rejectCancelBtn" class="modal-cancel-btn" onclick="closeModal('rejectModal')">Cancel</button>
                <button id="rejectConfirmBtn" class="modal-reject-btn" onclick="confirmReject()">Reject</button>
            </div>
        </div>
    </div>

    <!-- ============ TOAST ============ -->
    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="js/app.js"></script>

</body>
</html>
